name: Deploy CutStudio Pro to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9
          run_install: false

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build
        env:
          PORT: "3000"
          # ⭐ CRITICAL: Empty string for relative paths!
          BASE_PATH: ""
          NODE_ENV: production
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_RAZORPAY_KEY: ${{ secrets.VITE_RAZORPAY_KEY }}
        run: pnpm --filter @workspace/cutstudio-web run build

      # ⭐ NEW: Verify build output
      - name: Verify dist structure
        run: |
          echo "=== Verifying build output ==="
          echo ""
          echo "Files in dist/public:"
          ls -la artifacts/cutstudio-web/dist/public/
          echo ""
          echo "--- Checking required files ---"
          
          # Check index.html exists
          if [ -f artifacts/cutstudio-web/dist/public/index.html ]; then
            echo "✅ index.html found"
            head -5 artifacts/cutstudio-web/dist/public/index.html
          else
            echo "❌ ERROR: index.html missing!"
            exit 1
          fi
          
          # Check 404.html was created
          if [ -f artifacts/cutstudio-web/dist/public/404.html ]; then
            echo "✅ 404.html created for SPA routing"
          else
            echo "⚠️ WARNING: 404.html might be missing!"
          fi
          
          # Show JS/CSS assets
          echo ""
          echo "JS/CSS Assets:"
          find artifacts/cutstudio-web/dist/public/assets -name "*.js" -o -name "*.css" | head -10
          echo "... and more"

      - name: Setup Pages
        uses: actions/configure-pages@v4

      # ⭐ IMPROVED: Fix SPA routing with verification
      - name: Fix SPA routing
        run: |
          echo "Creating 404.html fallback for SPA..."
          
          # Copy index.html as 404.html (GitHub Pages serves this for unknown routes)
          cp artifacts/cutstudio-web/dist/public/index.html artifacts/cutstudio-web/dist/public/ 404.html
          
          # Verify it worked
          if [ -f artifacts/cutstudio-web/dist/public/404.html ]; then
            echo "✅ 404.html created successfully"
            ls -lh artifacts/cutstudio-web/dist/public/404.html
          else
            echo "❌ FAILED to create 404.html"
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: artifacts/cutstudio-web/dist/public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
