name: Deploy CutStudio Pro to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9
          run_install: false

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build
        env:
          PORT: "3000"
          BASE_PATH: ""
          NODE_ENV: production
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_RAZORPAY_KEY: ${{ secrets.VITE_RAZORPAY_KEY }}
        run: pnpm --filter @workspace/cutstudio-web run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      # ⭐ SIMPLE 404 FIX - Uses echo heredoc instead of cp
      - name: Create 404 fallback for SPA
        run: |
          echo "Creating 404.html..."
          
          # Ensure directory exists
          mkdir -p artifacts/cutstudio-web/dist/public
          
          # Write 404.html directly (NO cp needed!)
          cat > artifacts/cutstudio-web/dist/public/404.html << 'EOF'
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <base href="./">
  <title>404</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #05050d;
      color: white;
      text-align: center;
      padding: 20px;
    }
    .code { font-size: 48px; font-weight: bold; margin-bottom: 16px; }
    .msg { font-size: 18px; opacity: 0.7; }
  </style>
</head>
<body>
  <div class="code">404</div>
  <div class="msg">Page Not Found</div>
  <script>
    if (!window.location.pathname.startsWith('/home')) {
      window.history.replaceStateState({}, '', '/' + window.location.pathname);
    } else {
      window.history.back();
    }
  </script>
</body>
</html>
EOF
          
          echo "✅ 404.html created!"
          ls -lh artifacts/cutstudio-web/dist/public/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: artifacts/cutstudio-web/dist/public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
