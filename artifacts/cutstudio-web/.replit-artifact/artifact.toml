kind = "web"
previewPath = "/"
title = "CutStudio Pro — Website"
version = "1.0.0"
id = "artifacts/cutstudio-web"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23314

[services.development]
run = "pnpm --filter @workspace/cutstudio-web run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cutstudio-web", "run", "build" ]
publicDir = "artifacts/cutstudio-web/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23314"
BASE_PATH = "/"
