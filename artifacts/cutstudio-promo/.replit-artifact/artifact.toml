kind = "video"
previewPath = "/cutstudio-promo/"
title = "CutStudio Pro — Promo Video"
version = "1.0.0"
id = "artifacts/cutstudio-promo"
router = "path"

[[integratedSkills]]
name = "video-js"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/cutstudio-promo/" ]
localPort = 20161

[services.development]
run = "pnpm --filter @workspace/cutstudio-promo run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cutstudio-promo", "run", "build" ]
publicDir = "artifacts/cutstudio-promo/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20161"
BASE_PATH = "/cutstudio-promo/"
